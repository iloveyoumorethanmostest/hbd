<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenshots</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 20px;
    background: #f2f2f2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .frame {
    display: inline-block;
    border: 6px solid #333;
    border-radius: 8px;
    background: #fff;
    max-width: 100%;
    line-height: 0; /* removes gap under inline img */
  }

  .frame img {
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
  }
</style>
</head>
<body>

  <div class="frame">
    <img src="ss/ss1.jpg" alt="Screenshot 1">
  </div>

  <div class="frame">
    <img src="ss/ss2.jpg" alt="Screenshot 2">
  </div>

  <div class="frame">
    <img src="ss/ss3.jpg" alt="Screenshot 3">
  </div>

  <div class="frame">
    <img src="ss/ss4.jpg" alt="Screenshot 4">
  </div>

  <div class="frame">
    <img src="ss/ss5.jpg" alt="Screenshot 5">
  </div>

  <div class="frame">
    <img src="ss/ss6.jpg" alt="Screenshot 6">
  </div>

  <div class="frame">
    <img src="ss/ss7.jpg" alt="Screenshot 7">
  </div>

  <div class="frame">
    <img src="ss/ss8.jpg" alt="Screenshot 8">
  </div>

</body>
</html>
