<html lang="en">

  <title>Birthday</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
    }

    img {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      height: 100dvh;
      object-fit: cover;
      object-position: center;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
